[supervisord]
nodaemon=true

[program:tigervnc]
command=/usr/bin/vncserver -SecurityTypes none -fg -geometry 1920x1080 :1
autorestart=true

[program:novnc]
command=websockify --web=/usr/share/novnc/ --cert=/home/ubuntu/novnc.pem 6080 localhost:5901
autorestart=true

[program:nginx]
command=nginx -g 'daemon off;'
autorestart=true
